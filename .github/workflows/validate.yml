name: Validate KirzKit

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check generated inventory and metadata
        run: python scripts/inventory.py --check
      - name: Check repository whitespace
        run: git diff --check
